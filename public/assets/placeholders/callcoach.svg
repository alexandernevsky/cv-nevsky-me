<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 1600" preserveAspectRatio="xMidYMid slice" role="img" aria-label="CallCoach placeholder">
  <defs>
    <linearGradient id="cc-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0b0d10"/>
      <stop offset="1" stop-color="#181b20"/>
    </linearGradient>
    <linearGradient id="cc-accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ff5b2e"/>
      <stop offset="1" stop-color="#ff8a3d"/>
