      <rect x="112" y="-24" width="6" height="88" rx="3"/>
      <rect x="128" y="-6"  width="6" height="52" rx="3"/>
      <rect x="144" y="-18" width="6" height="76" rx="3"/>
      <rect x="160" y="0"   width="6" height="40" rx="3"/>
