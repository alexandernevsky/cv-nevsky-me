<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1200" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Family productivity app placeholder">
  <defs>
    <linearGradient id="fa-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2b1f17"/>
      <stop offset="1" stop-color="#17100a"/>
    </linearGradient>
    <linearGradient id="fa-accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ff5b2e"/>
      <stop offset="1" stop-color="#ffb56b"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="1200" fill="url(#fa-bg)"/>

  <g transform="translate(120 120)" font-family="'Geist Mono', ui-monospace, monospace" fill="#f1e9d6">
    <text font-size="20" opacity="0.5">FAMILY · WEEK 18</text>
    <text y="72" font-size="64" font-weight="800" letter-spacing="-1.5">Monday, April 21</text>
  </g>

  <g transform="translate(120 320)" font-family="'Geist Mono', ui-monospace, monospace">
    <g transform="translate(0 0)">
      <circle r="20" cx="20" cy="20" fill="none" stroke="url(#fa-accent)" stroke-width="3"/>
      <path d="M10 20 L18 28 L32 12" stroke="url(#fa-accent)" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="60" y="26" font-size="24" fill="#f1e9d6">Leo · school drop-off — 07:40</text>
      <text x="860" y="26" font-size="20" fill="url(#fa-accent)">+3 pts</text>
    </g>
    <g transform="translate(0 80)">
      <circle r="20" cx="20" cy="20" fill="none" stroke="#f1e9d6" stroke-opacity="0.4" stroke-width="3"/>
      <text x="60" y="26" font-size="24" fill="#f1e9d6">Mia · piano practice — 16:30</text>
      <text x="860" y="26" font-size="20" fill="#f1e9d6" opacity="0.4">5 pts</text>
    </g>
    <g transform="translate(0 160)">
      <circle r="20" cx="20" cy="20" fill="none" stroke="#f1e9d6" stroke-opacity="0.4" stroke-width="3"/>
      <text x="60" y="26" font-size="24" fill="#f1e9d6">Grocery pickup — before 19:00</text>
      <text x="860" y="26" font-size="20" fill="#f1e9d6" opacity="0.4">4 pts</text>
    </g>
    <g transform="translate(0 240)">
      <circle r="20" cx="20" cy="20" fill="none" stroke="#f1e9d6" stroke-opacity="0.4" stroke-width="3"/>
      <text x="60" y="26" font-size="24" fill="#f1e9d6">Family call with Grandma — 20:30</text>
      <text x="860" y="26" font-size="20" fill="#f1e9d6" opacity="0.4">2 pts</text>
    </g>
  </g>

  <g transform="translate(120 780)" font-family="'Geist Mono', ui-monospace, monospace">
    <text font-size="18" fill="#f1e9d6" opacity="0.5">THIS WEEK · COMBINED</text>
    <g transform="translate(0 40)">
      <rect x="0" y="0" width="960" height="14" rx="7" fill="#f1e9d6" fill-opacity="0.08"/>
      <rect x="0" y="0" width="640" height="14" rx="7" fill="url(#fa-accent)"/>
    </g>
    <text x="0" y="90" font-size="46" font-weight="800" fill="#f1e9d6">128 / 192 pts</text>
  </g>

  <text x="120" y="1120" font-family="'Geist Mono', ui-monospace, monospace" font-size="18" fill="#f1e9d6" opacity="0.45">FAMILY OPS · PRIVATE BETA · BUILT WITH CLAUDE + CODEX</text>
</svg>
