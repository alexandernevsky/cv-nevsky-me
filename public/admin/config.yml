backend:
  name: github
  repo: alexandernevsky/cv-nevsky-me
  branch: main
  base_url: https://decap.nevsky.me
  auth_endpoint: /auth

local_backend: true
media_folder: public/uploads
public_folder: /uploads

site_url: https://cv.nevsky.me
display_url: https://cv.nevsky.me
logo_url: /favicon.svg

collections:
  - name: pages
    label: Pages
    files:
      - name: cv
        label: CV
        file: content/pages/cv.md
        fields:
          - { label: ID, name: id, widget: string, default: cv, pattern: ['^[a-z0-9]+(?:-[a-z0-9]+)*$', 'Use lowercase kebab-case.'] }
          - label: English
            name: en
            widget: object
            collapsed: false
            fields:
              - { label: Slug, name: slug, widget: string }
              - { label: Title, name: title, widget: string }
              - { label: Excerpt, name: excerpt, widget: text, required: false }
          - { label: Content EN, name: body_en, widget: markdown }
          - label: Russian
            name: ru
            widget: object
            collapsed: false
            fields:
              - { label: Slug, name: slug, widget: string }
              - { label: Title, name: title, widget: string }
              - { label: Excerpt, name: excerpt, widget: text, required: false }
          - { label: Content RU, name: body_ru, widget: markdown }

      - name: about
        label: About
        file: content/pages/about.md
        fields:
          - { label: ID, name: id, widget: string, default: about, pattern: ['^[a-z0-9]+(?:-[a-z0-9]+)*$', 'Use lowercase kebab-case.'] }
          - label: English
            name: en
            widget: object
            collapsed: false
            fields:
              - { label: Slug, name: slug, widget: string }
              - { label: Title, name: title, widget: string }
              - { label: Excerpt, name: excerpt, widget: text, required: false }
          - { label: Content EN, name: body_en, widget: markdown }
          - label: Russian
            name: ru
            widget: object
            collapsed: false
            fields:
              - { label: Slug, name: slug, widget: string }
              - { label: Title, name: title, widget: string }
              - { label: Excerpt, name: excerpt, widget: text, required: false }
          - { label: Content RU, name: body_ru, widget: markdown }

  - name: settings
    label: Settings
    files:
      - name: profile
        label: Profile and contacts
        file: content/settings/profile.md
        fields:
          - label: Name
            name: name
            widget: object
            fields:
              - { label: English, name: en, widget: string }
              - { label: Russian, name: ru, widget: string }
          - label: Role
            name: role
            widget: object
            fields:
              - { label: English, name: en, widget: string }
              - { label: Russian, name: ru, widget: string }
          - label: Sub role
            name: subRole
            widget: object
            fields:
              - { label: English, name: en, widget: string }
              - { label: Russian, name: ru, widget: string }
          - label: Assistant title
            name: answerTitle
            widget: object
            fields:
              - { label: English, name: en, widget: string }
              - { label: Russian, name: ru, widget: string }
          - label: Location
            name: location
            widget: object
            fields:
              - { label: English, name: en, widget: string }
              - { label: Russian, name: ru, widget: string }
          - label: Availability
            name: availability
            widget: object
            fields:
              - { label: English, name: en, widget: string }
              - { label: Russian, name: ru, widget: string }
          - label: Summary
            name: summary
            widget: object
            fields:
              - { label: English, name: en, widget: text }
              - { label: Russian, name: ru, widget: text }
          - label: Positioning statements
            name: positioning
            widget: list
            collapsed: true
            hint: "Shown randomly above the intro. Add more when needed."
            summary: "{{fields.en}}"
            fields:
              - { label: English, name: en, widget: text }
              - { label: Russian, name: ru, widget: text }
          - { label: Avatar path, name: avatar, widget: string }
          - label: Links
            name: links
            widget: object
            fields:
              - { label: Portfolio, name: portfolio, widget: string, hint: "Framer portfolio, for example https://nevskii.me" }
              - { label: Blog, name: blog, widget: string, hint: "Blog, for example https://nevsky.me" }
              - { label: LinkedIn, name: linkedin, widget: string, required: false }
              - { label: Telegram, name: telegram, widget: string, required: false }
              - { label: WhatsApp, name: whatsapp, widget: string, required: false }
              - { label: Email link, name: email, widget: string }
              - { label: Phone link, name: phone, widget: string, required: false }
              - { label: Email address, name: emailAddress, widget: string }
              - { label: Phone number, name: phoneNumber, widget: string, required: false }

  - name: topics
    label: Chat topics
    label_singular: Chat topic
    folder: content/topics
    create: true
    slug: "{{fields.id}}"
    identifier_field: en.label
    summary: "{{order}} · {{en.label}} / {{ru.label}}"
    sortable_fields: [order, category, en.label, ru.label]
    view_groups:
      - label: Category
        field: category
    editor:
      preview: false
    fields:
      - { label: Topic ID, name: id, widget: string, hint: "Stable id used in links and follow-ups, for example current-builds.", pattern: ['^[a-z0-9]+(?:-[a-z0-9]+)*$', 'Use lowercase kebab-case, for example current-builds.'] }
      - { label: Sidebar order, name: order, widget: number, value_type: int, default: 100, hint: "Lower numbers appear earlier." }
      - label: Category
        name: category
        widget: select
        hint: "Controls the sidebar section."
        options:
          - { label: Start, value: start }
          - { label: About, value: about }
          - { label: Work, value: work }
          - { label: Current builds, value: builds }
          - { label: AI, value: ai }
          - { label: Life, value: life }
          - { label: Contact, value: contact }
      - { label: Show in sidebar, name: visible_in_sidebar, widget: boolean, default: true, hint: "Turn off for topics used only as follow-ups or free-text matches." }
      - label: Related project IDs
        name: related_project_ids
        widget: relation
        collection: projects
        search_fields: [id, en.title, ru.title]
        value_field: id
        display_fields: [en.title, ru.title, id]
        multiple: true
        options_length: 100
        hint: "Project cards rendered under the answer. Use project IDs from content/projects."
        required: false
      - label: Follow-up topic IDs
        name: follow_ups
        widget: relation
        collection: topics
        search_fields: [id, en.label, ru.label]
        value_field: id
        display_fields: [en.label, ru.label, id]
        multiple: true
        options_length: 100
        hint: "Chips shown below the answer. Use topic IDs from this collection."
        required: false
      - label: English
        name: en
        widget: object
        collapsed: false
        summary: "{{fields.label}}"
        fields:
          - { label: Sidebar label, name: label, widget: string }
          - { label: Chip label, name: chip_label, widget: string, required: false, hint: "Shorter text for suggestion chips. Falls back to sidebar label." }
          - { label: User prompt, name: prompt, widget: string, hint: "Message inserted into the chat when the topic is opened." }
          - label: Keywords
            name: keywords
            widget: list
            collapsed: true
            hint: "Free-text matching terms. Multi-word phrases work."
            required: false
            field: { label: Keyword, name: keyword, widget: string }
          - { label: Answer, name: response, widget: markdown }
      - label: Russian
        name: ru
        widget: object
        collapsed: true
        summary: "{{fields.label}}"
        fields:
          - { label: Sidebar label RU, name: label, widget: string }
          - { label: Chip label RU, name: chip_label, widget: string, required: false, hint: "Shorter text for suggestion chips. Falls back to sidebar label." }
          - { label: User prompt RU, name: prompt, widget: string, hint: "Message inserted into the chat when the topic is opened." }
          - label: Keywords
            name: keywords
            widget: list
            collapsed: true
            hint: "Russian free-text matching terms. Multi-word phrases work."
            required: false
            field: { label: Keyword, name: keyword, widget: string }
          - { label: Answer RU, name: response, widget: markdown }

  - name: projects
    label: Projects
    label_singular: Project
    folder: content/projects
    create: true
    slug: "{{fields.id}}"
    identifier_field: en.title
    summary: "{{en.title}} / {{ru.title}}"
    fields:
      - { label: ID, name: id, widget: string, hint: "Stable file id, for example fundmates-ai-app-cv.", pattern: ['^[a-z0-9]+(?:-[a-z0-9]+)*$', 'Use lowercase kebab-case.'] }
      - { label: Date, name: date, widget: datetime, date_format: YYYY-MM-DD, time_format: false }
      - { label: Feature image URL, name: feature_image, widget: string, required: false }
      - label: Tags
        name: tags
        widget: list
        default: [design]
        field: { label: Tag, name: tag, widget: string }
      - label: English
        name: en
        widget: object
        collapsed: false
        fields:
          - { label: Slug EN, name: slug, widget: string }
          - { label: Title EN, name: title, widget: string }
          - { label: Excerpt EN, name: excerpt, widget: text, required: false }
      - { label: Content EN, name: body_en, widget: markdown }
      - label: Russian
        name: ru
        widget: object
        collapsed: false
        fields:
          - { label: Slug RU, name: slug, widget: string }
          - { label: Title RU, name: title, widget: string }
          - { label: Excerpt RU, name: excerpt, widget: text, required: false }
      - { label: Content RU, name: body_ru, widget: markdown }

  - name: blog-tags
    label: Blog tags
    label_singular: Blog tag
    folder: content/blog/tags
    create: true
    slug: "{{fields.id}}"
    identifier_field: id
    summary: "{{ru.name}} / {{en.name}}"
    editor:
      preview: false
    fields:
      - { label: ID, name: id, widget: string, pattern: ['^[a-z0-9]+(?:-[a-z0-9]+)*$', 'Use lowercase kebab-case.'] }
      - label: Source slugs
        name: source
        widget: object
        collapsed: true
        fields:
          - { label: Russian slug, name: ru, widget: string, required: false }
          - { label: English slug, name: en, widget: string, required: false }
      - label: Russian
        name: ru
        widget: object
        collapsed: false
        fields:
          - { label: Slug, name: slug, widget: string, required: false }
          - { label: Name, name: name, widget: string }
          - { label: Description, name: description, widget: text, required: false }
          - { label: Feature image, name: feature_image, widget: string, required: false }
      - label: English
        name: en
        widget: object
        collapsed: false
        fields:
          - { label: Slug, name: slug, widget: string, required: false }
          - { label: Name, name: name, widget: string }
          - { label: Description, name: description, widget: text, required: false }
          - { label: Feature image, name: feature_image, widget: string, required: false }

  - name: blog-authors
    label: Blog authors
    label_singular: Blog author
    folder: content/blog/authors
    create: false
    slug: "{{fields.slug}}"
    identifier_field: name
    summary: "{{name}}"
    editor:
      preview: false
    fields:
      - { label: ID, name: id, widget: string, pattern: ['^[a-z0-9]+(?:-[a-z0-9]+)*$', 'Use lowercase kebab-case.'] }
      - { label: Slug, name: slug, widget: string, pattern: ['^[a-z0-9]+(?:-[a-z0-9]+)*$', 'Use lowercase kebab-case.'] }
      - { label: Name, name: name, widget: string }
      - { label: Bio, name: bio, widget: text, required: false }
      - { label: Profile image, name: profile_image, widget: string, required: false }
      - { label: Website, name: website, widget: string, required: false }
      - { label: Location, name: location, widget: string, required: false }
      - label: Socials
        name: socials
        widget: object
        collapsed: true
        fields:
          - { label: Facebook, name: facebook, widget: string, required: false }
          - { label: Twitter, name: twitter, widget: string, required: false }
          - { label: Threads, name: threads, widget: string, required: false }
          - { label: Bluesky, name: bluesky, widget: string, required: false }
          - { label: Mastodon, name: mastodon, widget: string, required: false }
          - { label: TikTok, name: tiktok, widget: string, required: false }
          - { label: YouTube, name: youtube, widget: string, required: false }
          - { label: Instagram, name: instagram, widget: string, required: false }
          - { label: LinkedIn, name: linkedin, widget: string, required: false }

  - name: blog-posts
    label: Blog posts
    label_singular: Blog post
    folder: content/blog/posts
    create: true
    slug: "{{fields.id}}"
    identifier_field: id
    summary: "{{date}} · {{ru.title}} / {{en.title}}"
    sortable_fields: [date, id, ru.title, en.title]
    editor:
      preview: false
    fields:
      - { label: ID, name: id, widget: string, pattern: ['^[a-z0-9]+(?:-[a-z0-9]+)*$', 'Use lowercase kebab-case.'] }
      - { label: Date, name: date, widget: datetime, date_format: YYYY-MM-DD, time_format: HH:mm:ss, format: YYYY-MM-DD HH:mm:ss }
      - label: Source
        name: source
        widget: object
        collapsed: true
        fields:
          - { label: Source kind, name: kind, widget: string, required: false }
          - { label: Russian Ghost ID, name: ru, widget: string, required: false }
          - { label: English Ghost ID, name: en, widget: string, required: false }
      - label: Published at
        name: published_at
        widget: object
        collapsed: true
        fields:
          - { label: Russian, name: ru, widget: string, required: false }
          - { label: English, name: en, widget: string, required: false }
      - label: Created at
        name: created_at
        widget: object
        collapsed: true
        fields:
          - { label: Russian, name: ru, widget: string, required: false }
          - { label: English, name: en, widget: string, required: false }
      - label: Updated at
        name: updated_at
        widget: object
        collapsed: true
        fields:
          - { label: Russian, name: ru, widget: string, required: false }
          - { label: English, name: en, widget: string, required: false }
      - { label: Featured, name: featured, widget: boolean, default: false }
      - label: Tags
        name: tags
        widget: relation
        collection: blog-tags
        search_fields: [id, ru.name, en.name]
        value_field: id
        display_fields: [ru.name, en.name, id]
        multiple: true
        options_length: 200
        required: false
      - { label: Feature image, name: feature_image, widget: string, required: false }
      - label: Feature image alt
        name: feature_image_alt
        widget: object
        collapsed: true
        fields:
          - { label: Russian, name: ru, widget: string, required: false }
          - { label: English, name: en, widget: string, required: false }
      - label: Feature image caption
        name: feature_image_caption
        widget: object
        collapsed: true
        fields:
          - { label: Russian, name: ru, widget: text, required: false }
          - { label: English, name: en, widget: text, required: false }
      - label: Russian
        name: ru
        widget: object
        collapsed: false
        fields:
          - { label: Slug, name: slug, widget: string }
          - { label: Title, name: title, widget: string }
          - { label: Excerpt, name: excerpt, widget: text, required: false }
          - { label: Body, name: body, widget: markdown, required: false }
      - label: English
        name: en
        widget: object
        collapsed: false
        fields:
          - { label: Slug, name: slug, widget: string }
          - { label: Title, name: title, widget: string }
          - { label: Excerpt, name: excerpt, widget: text, required: false }
          - { label: Body, name: body, widget: markdown, required: false }
      - label: Segments
        name: segments
        widget: list
        collapsed: true
        hint: "Ordered bilingual content blocks. Keep RU and EN aligned by block."
        summary: "{{fields.kind}}"
        fields:
          - label: Kind
            name: kind
            widget: select
            options:
              - { label: Text, value: text }
              - { label: Heading, value: heading }
              - { label: List, value: list }
              - { label: Quote, value: quote }
              - { label: Image, value: image }
              - { label: Video, value: video }
              - { label: Embed, value: embed }
              - { label: Raw, value: raw }
          - { label: RU, name: ru, widget: markdown, required: false }
          - { label: EN, name: en, widget: markdown, required: false }
          - { label: Source URL, name: src, widget: string, required: false }
          - label: Alt text
            name: alt
            widget: object
            collapsed: true
            fields:
              - { label: Russian, name: ru, widget: string, required: false }
              - { label: English, name: en, widget: string, required: false }
          - label: Caption
            name: caption
            widget: object
            collapsed: true
            fields:
              - { label: Russian, name: ru, widget: text, required: false }
              - { label: English, name: en, widget: text, required: false }
          - { label: Poster URL, name: poster, widget: string, required: false }

